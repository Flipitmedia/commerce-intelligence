<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commerce Intelligence — Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 50: '#f0fdf9', 100: '#ccfbef', 200: '#99f6de', 300: '#5ceaca', 400: '#2dd4ab', 500: '#14b892', 600: '#0d9477', 700: '#0f7661', 800: '#115e4f', 900: '#134e42' },
          }
        }
      }
    }
  </script>
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm px-6">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-brand-500 flex items-center justify-center">
        <span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'FILL' 1">analytics</span>
      </div>
      <div>
        <h1 class="text-xl font-semibold text-slate-900">Commerce Intelligence</h1>
        <p class="text-xs text-slate-400">Panel de administracion</p>
      </div>
    </div>

    <!-- Login form -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <form action="/admin/login" method="POST" class="px-6 py-6">
        <label class="block text-sm font-medium text-slate-700 mb-2">Clave de acceso</label>
        <input type="password" name="password" required autofocus placeholder="Ingresa tu clave"
               class="w-full px-3 py-2.5 text-sm rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 mb-4">
        {% if error %}
        <div class="flex items-center gap-2 px-3 py-2 mb-4 rounded-lg bg-red-50 text-red-600 text-xs">
          <span class="material-symbols-outlined text-[16px]">error</span>
          {{ error }}
        </div>
        {% endif %}
        <button type="submit"
                class="w-full px-4 py-2.5 rounded-lg text-sm font-medium text-white bg-brand-500 hover:bg-brand-600 transition-colors">
          Entrar
        </button>
      </form>
    </div>
  </div>

</body>
</html>
